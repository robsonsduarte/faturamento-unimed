services:
  faturamento:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: faturamento-unimed
    restart: unless-stopped
    env_file: .env.production
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - faturamento_internal
      - infra_default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  faturamento_internal:
    driver: bridge
  infra_default:
    external: true
